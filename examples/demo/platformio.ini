[common]
build_unflags_shared = -std=gnu++11
build_flags_shared = -std=gnu++17
    -Wall
    -Werror

[env:ttgo-t1-esp-idf]
platform = espressif32
board = ttgo-t1
board_build.partitions = 4MB.csv
framework = espidf
upload_speed = 921600
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
extra_scripts = pre:buffers_extra.py
lib_deps = codewitch-honey-crisis/htcw_frame
build_unflags = ${common.build_unflags_shared}
build_flags = ${common.build_flags_shared}
    -DTTGO_T1
upload_port=COM23

[env:ttgo-t1-arduino]
platform = espressif32
board = ttgo-t1
board_build.partitions = 4MB.csv
framework = arduino
upload_speed = 921600
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
extra_scripts = pre:buffers_extra.py
lib_deps = codewitch-honey-crisis/htcw_frame
build_unflags = ${common.build_unflags_shared}
build_flags = ${common.build_flags_shared}
    -DTTGO_T1
upload_port=COM23
